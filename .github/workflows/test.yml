name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      # tests/conftest.py + every studio_*_repo test connects to
      # mongodb://localhost:27017 at fixture setup. Without a service
      # container, motor's AsyncIOMotorClient hangs (the async connect
      # bypasses serverSelectionTimeoutMS in some paths) and pytest
      # never returns. mongo:7 matches the dev MongoDB version.
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' | grep -q 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest + runtime deps that tests import
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov pytest-asyncio pytest-mock
          # Tests import app.py (and indirectly modules/*.py) so the
          # minimal set of non-ML runtime deps has to be present. ML
          # deps (torch, transformers, flash-attn, etc.) stay out —
          # individual tests that need them use pytest.importorskip or
          # are marked with phase markers skipped in CI.
          # motor + pymongo: studio_*_repo tests (playlist, result,
          # saved_host, user) import AsyncIOMotorClient at module level
          # so collection fails without them.
          # bcrypt + pyjwt: auth tests import modules.auth which uses
          # both at module load.
          python -m pip install fastapi httpx python-multipart Pillow python-dotenv uvicorn google-genai pyyaml motor pymongo bcrypt PyJWT
      - name: Run pytest (skipped tests count as green)
        run: pytest -v

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Audit requirements.txt
        run: pip-audit --requirement requirements.txt --strict
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run test -- --run
      - run: npm audit --audit-level=high
        continue-on-error: true
